<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Cuemath Launcher</title>
    <style>
        body { 
            background: #ffffff;
            color: #002d62;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .btn {
            background-color: #ffcc00; /* Cuemath Yellow */
            color: #002d62;
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <img src="cue-math-logo.png" alt="Cuemath" style="width: 200px; margin-bottom: 30px;">
    <button class="btn" onclick="launchInSameWindow()">Start Math Lesson</button>

    <script>
        function launchInSameWindow() {
            // Using .href in an onclick keeps the navigation in the current PWA window
            window.location.href = "https://leap.cuemath.com/home";
        }
    </script>
</body>
</html>
