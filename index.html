<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Cuemath Launcher</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #f4f4f9;
        }
        .btn {
            padding: 20px 40px;
            font-size: 24px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>Cuemath Student Portal</h1>
    <button class="btn" onclick="launchApp()">Open Cuemath</button>

    <script>
        function launchApp() {
            // This opens the URL in a new window. 
            // On a Chromebook PWA, this usually stays inside the PWA 'container' 
            // or opens a focused window without the address bar.
            window.open("https://leap.cuemath.com/home", "_blank", "toolbar=no,scrollbars=yes,resizable=yes,status=no");
        }
        
        // Auto-launch on start
        window.onload = launchApp;
    </script>
</body>
</html>
